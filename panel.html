<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/favicon.ico" />
    <title>Panel - AutoVentas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
<link rel="stylesheet" href="css/styles.css">
   
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar">
          <h4 class="text-center">AutoVentas</h4>

          <hr />

          <a href="#">Dashboard</a>
          <a href="#">Usuarios</a>
          <a href="#">Vehículos</a>
          <a href="#">Ventas</a>

          <hr />

          <button class="btn btn-secondary w-100 mb-2" onclick="modo()">
            Cambiar modo
          </button>

          <button class="btn btn-danger w-100" onclick="logout()">
            Cerrar sesión
          </button>
        </div>

        <div class="col-md-10 p-4">
          <h3 class="mb-2">Panel de Administrador</h3>

          <p>Bienvenido <b id="usuarioNombre"></b></p>

          <div class="row mb-4">
            <div class="col-md-4">
              <div class="card text-bg-primary shadow">
                <div class="card-body">
                  <h5>Usuarios</h5>
                  <h2 id="totalUsuarios">0</h2>
                </div>
              </div>
            </div>

            <div class="col-md-4">
              <div class="card text-bg-success shadow">
                <div class="card-body">
                  <h5>Vehículos</h5>
                  <h2>25</h2>
                </div>
              </div>
            </div>

            <div class="col-md-4">
              <div class="card text-bg-warning shadow">
                <div class="card-body">
                  <h5>Ventas</h5>
                  <h2>12</h2>
                </div>
              </div>
            </div>
          </div>

          <div class="card shadow">
            <div class="card-header">Usuarios registrados</div>

            <div class="card-body">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                  </tr>
                </thead>

                <tbody id="tablaUsuarios"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

      if (!usuarioActivo) {
        window.location.href = "login.html";
      }

      document.getElementById("usuarioNombre").innerText = usuarioActivo.nombre;

      let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

      document.getElementById("totalUsuarios").innerText = usuarios.length;

      let tabla = document.getElementById("tablaUsuarios");

      usuarios.forEach((user) => {
        tabla.innerHTML += `
<tr>
<td>${user.nombre}</td>
<td>${user.correo}</td>
</tr>
`;
      });

      function logout() {
        localStorage.removeItem("usuarioActivo");
        window.location.href = "login.html";
      }

      function modo() {
        if (document.body.classList.contains("oscuro")) {
          document.body.classList.remove("oscuro");
          localStorage.setItem("modo", "claro");
        } else {
          document.body.classList.add("oscuro");
          localStorage.setItem("modo", "oscuro");
        }
      }

      let modoGuardado = localStorage.getItem("modo");

      if (modoGuardado == "oscuro") {
        document.body.classList.add("oscuro");
      }
    </script>
  </body>
</html>
