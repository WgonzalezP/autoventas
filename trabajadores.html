<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/favicon.ico" />
    <title>Registro de Trabajadores - AutoVentas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="bg-light">
    <!-- Navbar igual que en index -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">AutoVentas</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto"></ul>
        </div>
      </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="card shadow">
            <div class="card-header bg-primary text-white">
              <h3 class="text-center mb-0">Registro de Trabajadores</h3>
            </div>
            <div class="card-body">
              <form id="formRegistroTrabajador">
                <div class="row">
                  <!-- RUC -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Ruc:</label>
                    <input
                      type="text"
                      id="ruc"
                      class="form-control"
                      placeholder="Ingrese RUC"
                    />
                  </div>

                  <!-- Nombre -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre:</label>
                    <input
                      type="text"
                      id="nombre"
                      class="form-control"
                      placeholder="Ingrese nombre"
                      required
                    />
                  </div>

                  <!-- Apellido paterno -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Apellido paterno:</label>
                    <input
                      type="text"
                      id="apellidoPaterno"
                      class="form-control"
                      placeholder="Ingrese apellido paterno"
                      required
                    />
                  </div>

                  <!-- Apellido materno -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Apellido Materno:</label>
                    <input
                      type="text"
                      id="apellidoMaterno"
                      class="form-control"
                      placeholder="Ingrese apellido materno"
                      required
                    />
                  </div>

                  <!-- Cédula -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Cedula:</label>
                    <input
                      type="text"
                      id="cedula"
                      class="form-control"
                      placeholder="Ingrese cédula"
                    />
                  </div>

                  <!-- Sexo -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Sexo:</label>
                    <div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="sexo"
                          id="sexoM"
                          value="Masculino"
                          checked
                        />
                        <label class="form-check-label" for="sexoM"
                          >Masculino</label
                        >
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="sexo"
                          id="sexoF"
                          value="Femenino"
                        />
                        <label class="form-check-label" for="sexoF"
                          >Femenino</label
                        >
                      </div>
                    </div>
                  </div>

                  <!-- Nivel de estudio -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Nivel de estudio:</label>
                    <div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="estudioNo"
                          value="No tiene"
                        />
                        <label class="form-check-label" for="estudioNo"
                          >No tiene</label
                        >
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="estudioTecnico"
                          value="Técnico"
                        />
                        <label class="form-check-label" for="estudioTecnico"
                          >Técnico</label
                        >
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="estudioUniversitario"
                          value="Universitario"
                        />
                        <label
                          class="form-check-label"
                          for="estudioUniversitario"
                          >Universitario</label
                        >
                      </div>
                    </div>
                  </div>

                  <!-- Ciudad de nacimiento -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Ciudad de nacimiento:</label>
                    <select id="ciudad" class="form-select">
                      <option value="">Seleccione una ciudad</option>
                      <option value="Bogotá">Bogotá</option>
                      <option value="Medellín">Medellín</option>
                      <option value="Cali">Cali</option>
                      <option value="Barranquilla">Barranquilla</option>
                      <option value="Cartagena">Cartagena</option>
                      <option value="Bucaramanga">Bucaramanga</option>
                      <option value="Pereira">Pereira</option>
                    </select>
                  </div>

                  <!-- Curriculum -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Curriculum:</label>
                    <input
                      type="file"
                      id="curriculum"
                      class="form-control"
                      accept=".pdf,.doc,.docx"
                    />
                    <small class="text-muted"
                      >Formatos permitidos: PDF, DOC, DOCX</small
                    >
                  </div>

                  <!-- Foto -->
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Foto:</label>
                    <input
                      type="file"
                      id="foto"
                      class="form-control"
                      accept="image/*"
                    />
                    <small class="text-muted">Formatos: JPG, PNG, GIF</small>
                  </div>
                </div>

                <!-- Botón de registro -->
                <div class="d-grid gap-2 col-6 mx-auto mt-4">
                  <button type="submit" class="btn btn-primary btn-lg">
                    Registrar Trabajador
                  </button>
                </div>
              </form>
            </div>
          </div>

          <!-- Lista de trabajadores registrados -->
          <div class="card shadow mt-5 mb-5">
            <div class="card-header bg-success text-white">
              <h4 class="mb-0">Trabajadores Registrados</h4>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped table-hover">
                  <thead class="table-dark">
                    <tr>
                      <th>RUC</th>
                      <th>Nombre completo</th>
                      <th>Cédula</th>
                      <th>Sexo</th>
                      <th>Estudios</th>
                      <th>Ciudad</th>
                      <th>Curriculum</th>
                      <th>Foto</th>
                    </tr>
                  </thead>
                  <tbody id="tablaTrabajadores">
                    <!-- Se llenará con JavaScript -->
                  </tbody>
                </table>
              </div>

              <!-- Mensaje cuando no hay trabajadores -->
              <div id="sinTrabajadores" class="text-center text-muted py-4">
                <p>No hay trabajadores registrados aún.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ===== FUNCIONALIDAD DE REGISTRO DE TRABAJADORES =====

      // Obtener trabajadores de localStorage o iniciar array vacío
      let trabajadores = JSON.parse(localStorage.getItem("trabajadores")) || [];

      // Referencias a elementos del DOM
      const tablaTrabajadores = document.getElementById("tablaTrabajadores");
      const sinTrabajadores = document.getElementById("sinTrabajadores");

      // Función para mostrar trabajadores en la tabla
      function mostrarTrabajadores() {
        // Limpiar tabla
        tablaTrabajadores.innerHTML = "";

        if (trabajadores.length === 0) {
          // Mostrar mensaje de no hay trabajadores
          sinTrabajadores.style.display = "block";
        } else {
          // Ocultar mensaje
          sinTrabajadores.style.display = "none";

          // Recorrer trabajadores y mostrarlos
          trabajadores.forEach((trabajador) => {
            // Formatear estudios
            let estudiosTexto =
              trabajador.estudios && trabajador.estudios.length > 0
                ? trabajador.estudios.join(", ")
                : "No especificado";

            tablaTrabajadores.innerHTML += `
              <tr>
                <td>${trabajador.ruc || "<span class='text-muted'>—</span>"}</td>
                <td>${trabajador.nombre} ${trabajador.apellidoPaterno} ${trabajador.apellidoMaterno}</td>
                <td>${trabajador.cedula || "<span class='text-muted'>—</span>"}</td>
                <td>${trabajador.sexo}</td>
                <td>${estudiosTexto}</td>
                <td>${trabajador.ciudad || "No especificada"}</td>
                <td>${trabajador.curriculum || "No adjunto"}</td>
                <td>${trabajador.foto || "No adjunto"}</td>
              </tr>
            `;
          });
        }
      }

      // Mostrar trabajadores al cargar la página
      mostrarTrabajadores();

      // Manejar envío del formulario
      document
        .getElementById("formRegistroTrabajador")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          // Obtener valores de los checkboxes de estudio
          let estudios = [];
          if (document.getElementById("estudioNo").checked)
            estudios.push("No tiene");
          if (document.getElementById("estudioTecnico").checked)
            estudios.push("Técnico");
          if (document.getElementById("estudioUniversitario").checked)
            estudios.push("Universitario");

          // Validar que al menos un estudio esté seleccionado
          if (estudios.length === 0) {
            alert("Por favor seleccione al menos un nivel de estudio");
            return;
          }

          // Crear objeto trabajador
          let nuevoTrabajador = {
            id: Date.now(), // Identificador único
            ruc: document.getElementById("ruc").value,
            nombre: document.getElementById("nombre").value,
            apellidoPaterno: document.getElementById("apellidoPaterno").value,
            apellidoMaterno: document.getElementById("apellidoMaterno").value,
            cedula: document.getElementById("cedula").value,
            sexo: document.querySelector('input[name="sexo"]:checked').value,
            estudios: estudios,
            ciudad: document.getElementById("ciudad").value,
            curriculum:
              document.getElementById("curriculum").files[0]?.name ||
              "No adjunto",
            foto:
              document.getElementById("foto").files[0]?.name || "No adjunto",
            fechaRegistro: new Date().toLocaleString(),
          };

          // Validar campos obligatorios
          if (
            !nuevoTrabajador.nombre ||
            !nuevoTrabajador.apellidoPaterno ||
            !nuevoTrabajador.apellidoMaterno
          ) {
            alert(
              "Por favor complete los campos obligatorios: Nombre, Apellido paterno y Apellido materno",
            );
            return;
          }

          // Agregar a array y guardar en localStorage
          trabajadores.push(nuevoTrabajador);
          localStorage.setItem("trabajadores", JSON.stringify(trabajadores));

          // Actualizar tabla
          mostrarTrabajadores();

          // Limpiar formulario
          this.reset();

          // Mostrar mensaje de éxito
          alert("✅ ¡Trabajador registrado exitosamente!");

          // Opcional: Hacer scroll hasta la tabla para ver el nuevo registro
          document
            .querySelector(".card.mt-5")
            .scrollIntoView({ behavior: "smooth" });
        });
    </script>
  </body>
</html>
